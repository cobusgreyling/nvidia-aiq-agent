<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- NVIDIA green gradient -->
    <linearGradient id="nvidiaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A8C00;stop-opacity:1" />
    </linearGradient>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A2E;stop-opacity:1" />
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Node pulse glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#76B900;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" rx="40" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#76B900" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>

  <!-- Connection lines from center to agent nodes -->
  <g stroke="#76B900" stroke-width="2" opacity="0.4" filter="url(#glow)">
    <!-- Center to top-left (DOC) -->
    <line x1="300" y1="265" x2="155" y2="165"/>
    <!-- Center to top-right (SQL) -->
    <line x1="300" y1="265" x2="445" y2="165"/>
    <!-- Center to bottom-left (WEB) -->
    <line x1="300" y1="265" x2="155" y2="365"/>
    <!-- Center to bottom-right (API) -->
    <line x1="300" y1="265" x2="445" y2="365"/>
  </g>

  <!-- Animated ring around center brain -->
  <circle cx="300" cy="265" r="72" fill="none" stroke="url(#nvidiaGrad)" stroke-width="2" opacity="0.3" stroke-dasharray="8 6"/>
  <circle cx="300" cy="265" r="85" fill="none" stroke="#76B900" stroke-width="1" opacity="0.15" stroke-dasharray="4 8"/>

  <!-- Center orchestrator node — the "brain" -->
  <circle cx="300" cy="265" r="55" fill="#0D0D0D" stroke="url(#nvidiaGrad)" stroke-width="3" filter="url(#strongGlow)"/>
  <!-- Brain icon (simplified neural network) -->
  <g transform="translate(300,265)" fill="none" stroke="#76B900" stroke-width="2.5" stroke-linecap="round">
    <!-- Central hub lines -->
    <circle cx="0" cy="0" r="6" fill="#76B900"/>
    <line x1="-18" y1="-14" x2="-6" y2="-4"/>
    <line x1="18" y1="-14" x2="6" y2="-4"/>
    <line x1="-18" y1="14" x2="-6" y2="4"/>
    <line x1="18" y1="14" x2="6" y2="4"/>
    <line x1="0" y1="-20" x2="0" y2="-6"/>
    <line x1="0" y1="20" x2="0" y2="6"/>
    <!-- Outer nodes -->
    <circle cx="-18" cy="-14" r="4" fill="#76B900"/>
    <circle cx="18" cy="-14" r="4" fill="#76B900"/>
    <circle cx="-18" cy="14" r="4" fill="#76B900"/>
    <circle cx="18" cy="14" r="4" fill="#76B900"/>
    <circle cx="0" cy="-20" r="4" fill="#76B900"/>
    <circle cx="0" cy="20" r="4" fill="#76B900"/>
    <!-- Cross connections -->
    <line x1="-18" y1="-14" x2="18" y2="-14" opacity="0.4"/>
    <line x1="-18" y1="14" x2="18" y2="14" opacity="0.4"/>
  </g>

  <!-- Agent node: DOC (top-left) -->
  <circle cx="155" cy="165" r="36" fill="none" stroke="#76B900" stroke-width="1" opacity="0.2"/>
  <circle cx="155" cy="165" r="28" fill="#111118" stroke="#76B900" stroke-width="2"/>
  <!-- Doc icon -->
  <g transform="translate(155,165)" fill="none" stroke="#76B900" stroke-width="1.8" stroke-linecap="round">
    <rect x="-10" y="-13" width="20" height="26" rx="2"/>
    <line x1="-5" y1="-6" x2="5" y2="-6"/>
    <line x1="-5" y1="-1" x2="5" y2="-1"/>
    <line x1="-5" y1="4" x2="3" y2="4"/>
  </g>

  <!-- Agent node: SQL (top-right) -->
  <circle cx="445" cy="165" r="36" fill="none" stroke="#76B900" stroke-width="1" opacity="0.2"/>
  <circle cx="445" cy="165" r="28" fill="#111118" stroke="#76B900" stroke-width="2"/>
  <!-- Database icon -->
  <g transform="translate(445,165)" fill="none" stroke="#76B900" stroke-width="1.8">
    <ellipse cx="0" cy="-10" rx="12" ry="5"/>
    <line x1="-12" y1="-10" x2="-12" y2="10"/>
    <line x1="12" y1="-10" x2="12" y2="10"/>
    <ellipse cx="0" cy="10" rx="12" ry="5"/>
    <ellipse cx="0" cy="0" rx="12" ry="5" opacity="0.4"/>
  </g>

  <!-- Agent node: WEB (bottom-left) -->
  <circle cx="155" cy="365" r="36" fill="none" stroke="#76B900" stroke-width="1" opacity="0.2"/>
  <circle cx="155" cy="365" r="28" fill="#111118" stroke="#76B900" stroke-width="2"/>
  <!-- Globe icon -->
  <g transform="translate(155,365)" fill="none" stroke="#76B900" stroke-width="1.8">
    <circle cx="0" cy="0" r="12"/>
    <ellipse cx="0" cy="0" rx="6" ry="12"/>
    <line x1="-12" y1="0" x2="12" y2="0"/>
    <path d="M-10,-6 Q0,-8 10,-6" opacity="0.6"/>
    <path d="M-10,6 Q0,8 10,6" opacity="0.6"/>
  </g>

  <!-- Agent node: API (bottom-right) -->
  <circle cx="445" cy="365" r="36" fill="none" stroke="#76B900" stroke-width="1" opacity="0.2"/>
  <circle cx="445" cy="365" r="28" fill="#111118" stroke="#76B900" stroke-width="2"/>
  <!-- API bracket icon -->
  <g transform="translate(445,365)" fill="none" stroke="#76B900" stroke-width="2.2" stroke-linecap="round">
    <path d="M-8,-12 L-14,0 L-8,12"/>
    <path d="M8,-12 L14,0 L8,12"/>
    <circle cx="0" cy="0" r="2.5" fill="#76B900"/>
  </g>

  <!-- Data flow particles (dots along connection lines) -->
  <g fill="#76B900" opacity="0.7">
    <circle cx="210" cy="205" r="2.5"/>
    <circle cx="240" cy="225" r="1.8"/>
    <circle cx="390" cy="205" r="2.5"/>
    <circle cx="360" cy="225" r="1.8"/>
    <circle cx="210" cy="325" r="2.5"/>
    <circle cx="240" cy="305" r="1.8"/>
    <circle cx="390" cy="325" r="2.5"/>
    <circle cx="360" cy="305" r="1.8"/>
  </g>

  <!-- Title: AIQ -->
  <text x="300" y="468" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="12" filter="url(#strongGlow)">
    <tspan fill="#76B900">AIQ</tspan>
  </text>

  <!-- Subtitle -->
  <text x="300" y="505" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="6" fill="#76B900" opacity="0.6">
    AGENT
  </text>

  <!-- Bottom tagline -->
  <text x="300" y="555" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="300" letter-spacing="3" fill="#555555">
    MULTI-SOURCE AGENTIC RAG
  </text>

  <!-- Corner accent lines -->
  <g stroke="#76B900" stroke-width="1.5" opacity="0.2">
    <line x1="30" y1="30" x2="70" y2="30"/>
    <line x1="30" y1="30" x2="30" y2="70"/>
    <line x1="570" y1="30" x2="530" y2="30"/>
    <line x1="570" y1="30" x2="570" y2="70"/>
    <line x1="30" y1="570" x2="70" y2="570"/>
    <line x1="30" y1="570" x2="30" y2="530"/>
    <line x1="570" y1="570" x2="530" y2="570"/>
    <line x1="570" y1="570" x2="570" y2="530"/>
  </g>
</svg>
